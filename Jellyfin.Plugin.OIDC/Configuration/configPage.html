<!DOCTYPE html>
<html>
<head>
    <title>OIDC RBAC</title>
    <style>
        .oidc-section { margin-bottom: 2em; }
        .oidc-card {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 1em;
            margin-bottom: 1em;
            background: rgba(255,255,255,0.03);
        }
        .oidc-card h4 { margin-top: 0; }
        .oidc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8em;
        }
        .oidc-field { display: flex; flex-direction: column; gap: 0.3em; }
        .oidc-field label { font-weight: 600; font-size: 0.9em; }
        .oidc-field input, .oidc-field select { padding: 0.4em; }
        .oidc-field.full { grid-column: 1 / -1; }
        .oidc-actions { margin-top: 0.5em; display: flex; gap: 0.5em; }
        .oidc-btn {
            padding: 0.5em 1.2em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .oidc-btn-primary { background: #00a4dc; color: #fff; }
        .oidc-btn-danger { background: #c62828; color: #fff; }
        .oidc-btn-success { background: #2e7d32; color: #fff; }
        .oidc-btn-secondary { background: #555; color: #fff; }
        .oidc-checkbox-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1em;
            margin: 0.5em 0;
        }
        .oidc-checkbox-row label {
            display: flex;
            align-items: center;
            gap: 0.3em;
            font-weight: normal;
        }
        .oidc-library-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
            margin-top: 0.3em;
        }
        .oidc-library-chip {
            background: #00a4dc33;
            border: 1px solid #00a4dc;
            border-radius: 4px;
            padding: 0.2em 0.6em;
            display: flex;
            align-items: center;
            gap: 0.3em;
        }
        .oidc-library-chip .remove {
            cursor: pointer;
            font-weight: bold;
            color: #c62828;
        }
        .oidc-status {
            padding: 0.5em 1em;
            border-radius: 4px;
            margin-bottom: 1em;
            display: none;
        }
        .oidc-status.success { display: block; background: #1b5e20; color: #fff; }
        .oidc-status.error { display: block; background: #b71c1c; color: #fff; }
        .oidc-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.5em;
            border-bottom: 2px solid #444;
        }
        .oidc-tab {
            padding: 0.6em 1.5em;
            cursor: pointer;
            border: none;
            background: none;
            color: #aaa;
            font-size: 1em;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .oidc-tab.active {
            color: #00a4dc;
            border-bottom-color: #00a4dc;
        }
        .oidc-tab-content { display: none; }
        .oidc-tab-content.active { display: block; }
    </style>
</head>
<body>
<div id="OidcConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-select,emby-checkbox">

    <div data-role="content">
        <div class="content-primary">
            <h2>OIDC RBAC Configuration</h2>

            <div id="statusMessage" class="oidc-status"></div>

            <div class="oidc-tabs">
                <button class="oidc-tab active" data-tab="providers">Providers</button>
                <button class="oidc-tab" data-tab="roles">Role Mappings</button>
                <button class="oidc-tab" data-tab="general">General</button>
            </div>

            <!-- PROVIDERS TAB -->
            <div id="tab-providers" class="oidc-tab-content active">
                <div class="oidc-section">
                    <div class="oidc-actions" style="margin-bottom:1em;">
                        <button id="btnAddProvider" class="oidc-btn oidc-btn-primary">+ Add Provider</button>
                    </div>
                    <div id="providerList"></div>
                </div>
            </div>

            <!-- ROLE MAPPINGS TAB -->
            <div id="tab-roles" class="oidc-tab-content">
                <div class="oidc-section">
                    <div class="oidc-actions" style="margin-bottom:1em;">
                        <button id="btnAddRoleMapping" class="oidc-btn oidc-btn-primary">+ Add Role Mapping</button>
                    </div>
                    <div id="roleMappingList"></div>
                </div>
            </div>

            <!-- GENERAL TAB -->
            <div id="tab-general" class="oidc-tab-content">
                <div class="oidc-section">
                    <div class="oidc-card">
                        <div class="oidc-grid">
                            <div class="oidc-field">
                                <label>Default Provider ID</label>
                                <input type="text" id="defaultProvider" placeholder="e.g. keycloak" />
                            </div>
                            <div class="oidc-field">
                                <label>Default Role (fallback)</label>
                                <input type="text" id="defaultRoleName" placeholder="e.g. viewer" />
                            </div>
                            <div class="oidc-field full">
                                <label>
                                    <input type="checkbox" id="autoCreateUsers" />
                                    Auto-create users on first OIDC login
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="oidc-actions" style="margin-top:2em;">
                <button id="btnSave" class="oidc-btn oidc-btn-success">Save Configuration</button>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
(function() {
    'use strict';

    var pluginId = 'd4e5f6a7-b8c9-0d1e-2f3a-4b5c6d7e8f90';
    var config = null;
    var libraries = {};
    var page = document.querySelector('#OidcConfigPage');

    function init() {
        bindStaticEvents();
        loadLibraries().then(loadConfig).catch(function(err) {
            showStatus('Failed to load configuration: ' + (err.message || err), true);
        });
    }

    function bindStaticEvents() {
        page.querySelectorAll('.oidc-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                page.querySelectorAll('.oidc-tab').forEach(function(t) { t.classList.remove('active'); });
                page.querySelectorAll('.oidc-tab-content').forEach(function(c) { c.classList.remove('active'); });
                tab.classList.add('active');
                page.querySelector('#tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        page.querySelector('#btnAddProvider').addEventListener('click', addProvider);
        page.querySelector('#btnAddRoleMapping').addEventListener('click', addRoleMapping);
        page.querySelector('#btnSave').addEventListener('click', save);

        // Event delegation for dynamically created buttons
        page.querySelector('#providerList').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            var action = btn.dataset.action;
            var idx = parseInt(btn.dataset.idx, 10);
            if (action === 'remove-provider') {
                config.Providers.splice(idx, 1);
                renderProviders();
            }
        });

        page.querySelector('#roleMappingList').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            var action = btn.dataset.action;
            var idx = parseInt(btn.dataset.idx, 10);
            if (action === 'remove-role') {
                config.RoleMappings.splice(idx, 1);
                renderRoleMappings();
            } else if (action === 'add-lib') {
                addLibToRole(idx);
            }
        });

        // Delegation for library chip removal
        page.querySelector('#roleMappingList').addEventListener('click', function(e) {
            if (e.target.classList.contains('remove')) {
                e.target.parentElement.remove();
            }
        });
    }

    function loadLibraries() {
        return new Promise(function(resolve) {
            ApiClient.fetch({
                url: ApiClient.getUrl('sso/OIDC/Config/Libraries'),
                type: 'GET',
                dataType: 'json'
            }).then(function(data) {
                libraries = data || {};
                resolve();
            }).catch(function() {
                libraries = {};
                resolve();
            });
        });
    }

    function loadConfig() {
        return ApiClient.getPluginConfiguration(pluginId).then(function(cfg) {
            config = cfg;
            config.Providers = config.Providers || [];
            config.RoleMappings = config.RoleMappings || [];
            renderProviders();
            renderRoleMappings();
            page.querySelector('#defaultProvider').value = config.DefaultProvider || '';
            page.querySelector('#defaultRoleName').value = config.DefaultRoleName || '';
            page.querySelector('#autoCreateUsers').checked = config.AutoCreateUsers !== false;
        });
    }

    function renderProviders() {
        var container = page.querySelector('#providerList');
        container.innerHTML = '';

        config.Providers.forEach(function(p, idx) {
            var card = document.createElement('div');
            card.className = 'oidc-card';
            card.innerHTML = '<h4>' + esc(p.DisplayName || 'New Provider') +
                (p.Enabled ? ' <span style="color:#4caf50">&#9679;</span>' : ' <span style="color:#888">&#9679;</span>') +
                '</h4>' +
                '<div class="oidc-grid">' +
                field('Provider ID', 'text', 'prov_id_' + idx, p.ProviderId, 'Unique identifier (e.g. keycloak)') +
                field('Display Name', 'text', 'prov_name_' + idx, p.DisplayName, 'Shown on login button') +
                field('Authority URL', 'text', 'prov_authority_' + idx, p.Authority, 'https://idp.example.com/realms/myrealm', true) +
                field('Client ID', 'text', 'prov_clientid_' + idx, p.ClientId, '') +
                field('Client Secret', 'password', 'prov_secret_' + idx, p.ClientSecret, '') +
                field('Scopes', 'text', 'prov_scopes_' + idx, p.Scopes || 'openid profile email', '') +
                field('Role Claim Path', 'text', 'prov_roleclaim_' + idx, p.RoleClaim || 'realm_access.roles', 'e.g. realm_access.roles or groups') +
                field('Username Claim', 'text', 'prov_userclaim_' + idx, p.UsernameClaim || 'preferred_username', '') +
                field('Display Name Claim', 'text', 'prov_displayclaim_' + idx, p.DisplayNameClaim || 'name', '') +
                field('Button Color', 'color', 'prov_color_' + idx, p.ButtonColor || '#4285F4', '') +
                field('Additional Params', 'text', 'prov_params_' + idx, p.AdditionalParameters || '', 'key=val&key2=val2', true) +
                '<div class="oidc-field"><label><input type="checkbox" id="prov_enabled_' + idx + '"' +
                (p.Enabled !== false ? ' checked' : '') + '/> Enabled</label></div>' +
                '</div>' +
                '<div class="oidc-actions">' +
                '<button class="oidc-btn oidc-btn-danger" data-action="remove-provider" data-idx="' + idx + '">Remove</button>' +
                '</div>';
            container.appendChild(card);
        });
    }

    function renderRoleMappings() {
        var container = page.querySelector('#roleMappingList');
        container.innerHTML = '';

        config.RoleMappings.forEach(function(m, idx) {
            var card = document.createElement('div');
            card.className = 'oidc-card';

            var libOptions = Object.keys(libraries).map(function(id) {
                return '<option value="' + esc(id) + '">' + esc(libraries[id]) + '</option>';
            }).join('');

            var selectedLibs = (m.LibraryIds || []).concat(
                (m.LibraryNames || []).map(function(name) {
                    var found = Object.keys(libraries).find(function(id) {
                        return libraries[id].toLowerCase() === name.toLowerCase();
                    });
                    return found || name;
                })
            );

            card.innerHTML = '<h4>Role: ' + esc(m.RoleName || 'New Role') + '</h4>' +
                '<div class="oidc-grid">' +
                field('Role Name', 'text', 'role_name_' + idx, m.RoleName, 'Must match IdP role claim value') +
                field('Priority', 'number', 'role_priority_' + idx, m.Priority || 0, 'Higher = takes precedence') +
                '</div>' +
                '<div class="oidc-checkbox-row">' +
                chk('role_admin_' + idx, 'Administrator', m.IsAdmin) +
                chk('role_alllibs_' + idx, 'All Libraries', m.EnableAllLibraries) +
                chk('role_livetv_' + idx, 'Live TV', m.EnableLiveTv) +
                chk('role_livetvmgmt_' + idx, 'Live TV Mgmt', m.EnableLiveTvManagement) +
                chk('role_playback_' + idx, 'Playback', m.EnableMediaPlayback !== false) +
                chk('role_remote_' + idx, 'Remote Access', m.EnableRemoteAccess !== false) +
                chk('role_transcode_' + idx, 'Transcoding', m.EnableTranscoding !== false) +
                chk('role_delete_' + idx, 'Delete Content', m.EnableContentDeletion) +
                chk('role_collections_' + idx, 'Collections', m.EnableCollectionManagement) +
                chk('role_subtitles_' + idx, 'Subtitles', m.EnableSubtitleManagement) +
                '</div>' +
                '<div class="oidc-field" style="margin-top:0.5em;">' +
                '<label>Libraries (when "All Libraries" is unchecked)</label>' +
                '<select id="role_libadd_' + idx + '"><option value="">-- Select library --</option>' + libOptions + '</select>' +
                '<button class="oidc-btn oidc-btn-secondary" style="margin-top:0.3em;width:fit-content;" ' +
                'data-action="add-lib" data-idx="' + idx + '">Add Library</button>' +
                '<div id="role_libs_' + idx + '" class="oidc-library-list"></div>' +
                '</div>' +
                '<div class="oidc-field" style="margin-top:0.5em;">' +
                '<label>Max Parental Rating (empty = unrestricted)</label>' +
                '<input type="number" id="role_maxrating_' + idx + '" value="' + (m.MaxParentalRating != null ? m.MaxParentalRating : '') + '" />' +
                '</div>' +
                '<div class="oidc-actions">' +
                '<button class="oidc-btn oidc-btn-danger" data-action="remove-role" data-idx="' + idx + '">Remove</button>' +
                '</div>';

            container.appendChild(card);

            var libContainer = page.querySelector('#role_libs_' + idx);
            selectedLibs.forEach(function(libId) {
                addLibChip(libContainer, libId);
            });
        });
    }

    function addProvider() {
        if (!config) return;
        config.Providers.push({
            ProviderId: '',
            DisplayName: 'New Provider',
            Authority: '',
            ClientId: '',
            ClientSecret: '',
            Scopes: 'openid profile email',
            RoleClaim: 'realm_access.roles',
            UsernameClaim: 'preferred_username',
            DisplayNameClaim: 'name',
            Enabled: true,
            ButtonColor: '#4285F4',
            ButtonIcon: '',
            AdditionalParameters: ''
        });
        renderProviders();
    }

    function addRoleMapping() {
        if (!config) return;
        config.RoleMappings.push({
            RoleName: '',
            Priority: 0,
            IsAdmin: false,
            EnableAllLibraries: false,
            LibraryIds: [],
            LibraryNames: [],
            EnableLiveTv: false,
            EnableLiveTvManagement: false,
            EnableMediaPlayback: true,
            EnableRemoteAccess: true,
            EnableTranscoding: true,
            EnableContentDeletion: false,
            EnableCollectionManagement: false,
            EnableSubtitleManagement: false,
            MaxParentalRating: null
        });
        renderRoleMappings();
    }

    function addLibToRole(roleIdx) {
        var select = page.querySelector('#role_libadd_' + roleIdx);
        var libId = select.value;
        if (!libId) return;

        var container = page.querySelector('#role_libs_' + roleIdx);
        var existing = container.querySelectorAll('.oidc-library-chip');
        for (var i = 0; i < existing.length; i++) {
            if (existing[i].dataset.libId === libId) return;
        }

        addLibChip(container, libId);
        select.value = '';
    }

    function addLibChip(container, libId) {
        var chip = document.createElement('span');
        chip.className = 'oidc-library-chip';
        chip.dataset.libId = libId;
        chip.innerHTML = esc(libraries[libId] || libId) +
            ' <span class="remove">&times;</span>';
        container.appendChild(chip);
    }

    function save() {
        if (!config) return;

        config.Providers = collectProviders();
        config.RoleMappings = collectRoleMappings();
        config.DefaultProvider = val('defaultProvider');
        config.DefaultRoleName = val('defaultRoleName');
        config.AutoCreateUsers = isChecked('autoCreateUsers');

        ApiClient.updatePluginConfiguration(pluginId, config).then(function() {
            showStatus('Configuration saved successfully!', false);
        }).catch(function(err) {
            showStatus('Failed to save: ' + (err.message || err), true);
        });
    }

    function collectProviders() {
        var providers = [];
        var cards = page.querySelectorAll('#providerList .oidc-card');
        cards.forEach(function(card, idx) {
            providers.push({
                ProviderId: val('prov_id_' + idx),
                DisplayName: val('prov_name_' + idx),
                Authority: val('prov_authority_' + idx),
                ClientId: val('prov_clientid_' + idx),
                ClientSecret: val('prov_secret_' + idx),
                Scopes: val('prov_scopes_' + idx),
                RoleClaim: val('prov_roleclaim_' + idx),
                UsernameClaim: val('prov_userclaim_' + idx),
                DisplayNameClaim: val('prov_displayclaim_' + idx),
                ButtonColor: val('prov_color_' + idx),
                AdditionalParameters: val('prov_params_' + idx),
                Enabled: isChecked('prov_enabled_' + idx),
                ButtonIcon: ''
            });
        });
        return providers;
    }

    function collectRoleMappings() {
        var mappings = [];
        var cards = page.querySelectorAll('#roleMappingList .oidc-card');
        cards.forEach(function(card, idx) {
            var libChips = page.querySelectorAll('#role_libs_' + idx + ' .oidc-library-chip');
            var libIds = [];
            libChips.forEach(function(chip) { libIds.push(chip.dataset.libId); });

            var maxRating = val('role_maxrating_' + idx);

            mappings.push({
                RoleName: val('role_name_' + idx),
                Priority: parseInt(val('role_priority_' + idx)) || 0,
                IsAdmin: isChecked('role_admin_' + idx),
                EnableAllLibraries: isChecked('role_alllibs_' + idx),
                LibraryIds: libIds,
                LibraryNames: [],
                EnableLiveTv: isChecked('role_livetv_' + idx),
                EnableLiveTvManagement: isChecked('role_livetvmgmt_' + idx),
                EnableMediaPlayback: isChecked('role_playback_' + idx),
                EnableRemoteAccess: isChecked('role_remote_' + idx),
                EnableTranscoding: isChecked('role_transcode_' + idx),
                EnableContentDeletion: isChecked('role_delete_' + idx),
                EnableCollectionManagement: isChecked('role_collections_' + idx),
                EnableSubtitleManagement: isChecked('role_subtitles_' + idx),
                MaxParentalRating: maxRating ? parseInt(maxRating) : null
            });
        });
        return mappings;
    }

    function field(label, type, id, value, placeholder, full) {
        return '<div class="oidc-field' + (full ? ' full' : '') + '">' +
            '<label for="' + id + '">' + esc(label) + '</label>' +
            '<input type="' + type + '" id="' + id + '" value="' + esc(String(value || '')) + '"' +
            (placeholder ? ' placeholder="' + esc(placeholder) + '"' : '') + ' />' +
            '</div>';
    }

    function chk(id, label, checked) {
        return '<label><input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + ' /> ' +
            esc(label) + '</label>';
    }

    function esc(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function val(id) {
        var el = page.querySelector('#' + id);
        return el ? el.value : '';
    }

    function isChecked(id) {
        var el = page.querySelector('#' + id);
        return el ? el.checked : false;
    }

    function showStatus(msg, isError) {
        var el = page.querySelector('#statusMessage');
        el.textContent = msg;
        el.className = 'oidc-status ' + (isError ? 'error' : 'success');
        setTimeout(function() { el.className = 'oidc-status'; }, 4000);
    }

    // Jellyfin fires 'pageshow' on the page element for SPA navigation
    page.addEventListener('pageshow', init);
    page.addEventListener('viewshow', init);
    // Fallback for direct page load
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(init, 0);
    } else {
        document.addEventListener('DOMContentLoaded', init);
    }
})();
</script>
</div>
</body>
</html>
